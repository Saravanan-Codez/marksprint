<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>MARKSPRINT Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$'], ['$$', '$$']] }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

/* THEME MATCH INDEX */

body{
background:#0b1f2a;
color:#9fe3ff;
min-height:100vh;
}

/* HEADER */

.header{
width:100%;
height:60px;
background:#100063;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
border-bottom:2px solid #2aa8d8;
}

.logo{
font-weight:bold;
letter-spacing:2px;
}

.toggle{
cursor:pointer;
}

/* CONTAINER */

.container{
max-width:600px;
margin:auto;
padding:15px;
}

/* PANEL */

.panel{
background:#090040;
border:2px solid #2aa8d8;
border-radius:14px;
padding:15px;
margin-top:20px;
box-shadow:0 0 15px rgba(0,200,255,0.3);
}

.section{
margin-bottom:20px;
}

.section-title{
font-size:14px;
opacity:0.8;
margin-bottom:8px;
}

/* BUTTON GRID */

.grid{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.choice{
padding:8px 14px;
background:#100063;
border:1px solid #2aa8d8;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.choice.active{
background:#2aa8d8;
color:black;
}

/* SWITCH ROW */

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

/* SWITCH */

.switch{
width:50px;
height:26px;
background:#100063;
border-radius:20px;
position:relative;
cursor:pointer;
border:1px solid #2aa8d8;
}

.switch::after{
content:"";
position:absolute;
width:22px;
height:22px;
background:white;
border-radius:50%;
top:2px;
left:2px;
transition:0.3s;
}

.switch.active{
background:#2aa8d8;
}

.switch.active::after{
left:26px;
}

/* START */

.start-btn{
width:100%;
padding:12px;
margin-top:15px;
background:#2aa8d8;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* QUIZ */

.hidden{
display:none;
}

.question-box{
background:#090040;
border:2px solid #2aa8d8;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.option{
background:#100063;
border:1px solid #2aa8d8;
padding:12px;
margin-top:8px;
border-radius:10px;
cursor:pointer;
}

.option.correct{
background:#22c55e;
}

.option.wrong{
background:#ef4444;
}

img{
width:100%;
margin-top:8px;
border-radius:8px;
}

.progress{
text-align:center;
margin-top:10px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">MARKSPRINT</div>
<div class="toggle">🌙</div>
</div>

<div class="container">

<!-- CUSTOM PANEL -->

<div id="customPanel" class="panel">

<!-- TYPE -->

<div class="section">

<div class="section-title">
TYPE OF QUIZ
</div>

<div class="grid" id="quizType">

<div class="choice">Lesson Wise</div>
<div class="choice">Volume Wise</div>
<div class="choice active">Full Portion</div>

</div>

</div>

<!-- LESSON -->

<div id="lessonSection" class="section hidden">

<div class="section-title">
Lessons
</div>

<div class="grid" id="lessonGrid"></div>

</div>

<!-- VOLUME -->

<div id="volumeSection" class="section hidden">

<div class="section-title">
Volume
</div>

<div class="grid" id="volumeGrid"></div>

</div>

<hr>

<!-- SWITCHES -->

<div class="row">
Repeat Wrong
<div id="repeatToggle" class="switch active"></div>
</div>

<div class="row">
Shuffle Questions
<div id="shuffleQToggle" class="switch active"></div>
</div>

<div class="row">
Shuffle Options
<div id="shuffleOToggle" class="switch active"></div>
</div>

<br>

<!-- TIMER -->

<div class="section">

<div class="section-title">
TIMER
</div>

<div class="grid" id="timerGroup">

<div class="choice active">OFF</div>
<div class="choice">5s</div>
<div class="choice">10s</div>

</div>

</div>

<!-- COUNT -->

<div class="section">

<div class="section-title">
NUMBER OF QUESTIONS
</div>

<div class="grid" id="countGroup">

<div class="choice active">All</div>
<div class="choice">14</div>
<div class="choice">15</div>
<div class="choice">20</div>

</div>

</div>

<button class="start-btn" onclick="startQuiz()">
START QUIZ
</button>

</div>

<!-- QUIZ AREA -->

<div id="quizArea" class="hidden">

<div id="progress" class="progress"></div>

<div id="questionBox" class="question-box"></div>

<div id="optionsBox"></div>

</div>

</div>

<script>

/* LOAD SUBJECT */

const params=new URLSearchParams(window.location.search);

const subject=params.get("subject")||"physics";

const csvFile=subject+".csv";

/* STATE */

let allQuestions=[];
let quizQuestions=[];
let wrongQuestions=[];

let current=0;
let score=0;

/* SWITCH LOGIC */

document.querySelectorAll(".switch")
.forEach(sw=>{

sw.onclick=()=>{

sw.classList.toggle("active");

};

});

/* BUTTON GROUP */

function activateChoiceGroup(id){

document.querySelectorAll("#"+id+" .choice")
.forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll("#"+id+" .choice")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

};

});

}

activateChoiceGroup("timerGroup");
activateChoiceGroup("countGroup");

/* TYPE SWITCH */

document.querySelectorAll("#quizType .choice")
.forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll("#quizType .choice")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

updateTypeUI();

};

});

function updateTypeUI(){

let type=document.querySelector("#quizType .active").innerText;

document.getElementById("lessonSection").classList.add("hidden");
document.getElementById("volumeSection").classList.add("hidden");

if(type==="Lesson Wise")
document.getElementById("lessonSection").classList.remove("hidden");

if(type==="Volume Wise")
document.getElementById("volumeSection").classList.remove("hidden");

}

/* LOAD CSV */

Papa.parse(csvFile,{
download:true,
header:true,
complete:function(res){

allQuestions=res.data.filter(q=>q.question);

generateLessonVolume();

}
});

/* DYNAMIC LESSONS */

function generateLessonVolume(){

let lessons=[...new Set(
allQuestions.map(q=>q.less)
)];

let volumes=[...new Set(
allQuestions.map(q=>q.vol)
)];

let lessonHTML="";

lessons.forEach(l=>{

lessonHTML+=`<div class="choice lessonBtn">${l}</div>`;

});

document.getElementById("lessonGrid").innerHTML=lessonHTML;

let volumeHTML="";

volumes.forEach(v=>{

volumeHTML+=`<div class="choice volumeBtn">Vol ${v}</div>`;

});

document.getElementById("volumeGrid").innerHTML=volumeHTML;

}

/* SHUFFLE */

function shuffleArray(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

}

/* START */

function startQuiz(){

quizQuestions=[...allQuestions];

/* SHUFFLE */

if(document.getElementById("shuffleQToggle")
.classList.contains("active"))

shuffleArray(quizQuestions);

/* LIMIT */

let count=document.querySelector("#countGroup .active")
.innerText;

if(count!=="All"){

quizQuestions=
quizQuestions.slice(0,parseInt(count));

}

document.getElementById("customPanel")
.classList.add("hidden");

document.getElementById("quizArea")
.classList.remove("hidden");

showQuestion();

}

/* SHOW */

function showQuestion(){

if(current>=quizQuestions.length){

finishQuiz();
return;

}

let q=quizQuestions[current];

document.getElementById("progress")
.innerText=
`${current+1}/${quizQuestions.length}`;

let qHTML=q.question;

if(q.question_img)
qHTML+=`<img src="${q.question_img}">`;

document.getElementById("questionBox")
.innerHTML=qHTML;

let options=[
q.option_1,
q.option_2,
q.option_3,
q.option_4
];

let imgs=[
q.option_1_img,
q.option_2_img,
q.option_3_img,
q.option_4_img
];

let optionsBox=
document.getElementById("optionsBox");

optionsBox.innerHTML="";

options.forEach((opt,i)=>{

let div=document.createElement("div");

div.className="option";

div.innerHTML=opt;

if(imgs[i])
div.innerHTML+=`<img src="${imgs[i]}">`;

div.onclick=()=>checkAnswer(div);

optionsBox.appendChild(div);

});

MathJax.typeset();

}

/* CHECK */

function checkAnswer(element){

let correct=
quizQuestions[current].answer_text;

let options=
document.querySelectorAll(".option");

options.forEach(opt=>{

if(opt.innerText.trim()===correct.trim())
opt.classList.add("correct");

});

if(element.innerText.trim()!==correct.trim()){

element.classList.add("wrong");

wrongQuestions.push(
quizQuestions[current]
);

}

options.forEach(opt=>opt.onclick=null);

setTimeout(()=>{

current++;
showQuestion();

},800);

}

/* FINISH */

function finishQuiz(){

let repeat=
document.getElementById("repeatToggle")
.classList.contains("active");

if(repeat && wrongQuestions.length>0){

quizQuestions=[...wrongQuestions];

wrongQuestions=[];

current=0;

showQuestion();

return;

}

alert(`Score: ${score}/${quizQuestions.length}`);

location.reload();

}

</script>

</body>

</html>
